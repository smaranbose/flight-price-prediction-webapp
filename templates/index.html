<!DOCTYPE html>
<html>

<head>
<title>Flight Price Predictor</title>

<style>

body{
    font-family: Arial, sans-serif;
    background-color:#f4f6f9;
}

.container{
    width:400px;
    margin:60px auto;
    padding:30px;
    background:white;
    border-radius:10px;
    box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

h1{
    text-align:center;
}

input, select{
    width:100%;
    padding:8px;
    margin-top:5px;
    margin-bottom:15px;
}

button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}

button:hover{
    background:#0056b3;
}

.result{
    text-align:center;
    font-size:20px;
    margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>✈ Flight Price Predictor</h1>

<form action="/predict" method="post">

<label>Airline</label>
<select name="airline">
<option value="Indigo">Indigo</option>
<option value="Air_India">Air India</option>
<option value="Vistara">Vistara</option>
<option value="SpiceJet">SpiceJet</option>
<option value="GO_FIRST">GO FIRST</option>
<option value="AirAsia">AirAsia</option>
</select>

<label>Source City</label>
<select name="source_city">
<option>Delhi</option>
<option>Mumbai</option>
<option>Bangalore</option>
<option>Kolkata</option>
<option>Hyderabad</option>
<option>Chennai</option>
</select>

<label>Destination City</label>
<select name="destination_city">
<option>Delhi</option>
<option>Mumbai</option>
<option>Bangalore</option>
<option>Kolkata</option>
<option>Hyderabad</option>
<option>Chennai</option>
</select>

<label>Departure Time</label>
<select name="departure_time">
<option>Early_Morning</option>
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
<option>Night</option>
<option>Late_Night</option>
</select>

<label>Arrival Time</label>
<select name="arrival_time">
<option>Early_Morning</option>
<option>Morning</option>
<option>Afternoon</option>
<option>Evening</option>
<option>Night</option>
<option>Late_Night</option>
</select>

<label>Stops</label>
<select name="stops">
<option value="0">Non Stop</option>
<option value="1">1 Stop</option>
<option value="2">2+ Stops</option>
</select>

<label>Class</label>
<select name="class">
<option value="0">Economy</option>
<option value="1">Business</option>
</select>

<label>Duration (hours)</label>
<input type="number" step="0.1" name="duration" required>

<label>Days Left</label>
<input type="number" name="days_left" required>

<button type="submit">Predict Price</button>

</form>

<div class="result">
{{ prediction_text }}
</div>

</div>

</body>
</html>
